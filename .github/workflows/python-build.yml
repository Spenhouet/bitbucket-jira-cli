name: Build Python package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test, lint and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run linting with ruff
        run: uv run ruff check

      - name: Check generated command reference is up to date
        run: |
          uv run python scripts/gen_cli_docs.py
          git diff --exit-code docs/reference \
            || { echo "::error::docs/reference is stale — run 'uv run python scripts/gen_cli_docs.py' and commit."; exit 1; }

      - name: Run tests with pytest
        run: uv run pytest

      - name: Test build (with sources for development)
        run: uv build

      - name: Test build (without sources for publication)
        run: |
          rm -rf dist/
          uv build --no-sources

      - name: Test package installation and import
        run: |
          uv run --with dist/*.whl --no-project -- python -c "import bitbucket_jira_cli; print('Package imports successfully')"

      - name: Test CLI commands
        run: |
          uv run --with dist/*.whl --no-project bitbucket-jira-cli --help
          uv run --with dist/*.whl --no-project bj --help

      - name: Upload build artifacts for inspection
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: dist/
          retention-days: 5
