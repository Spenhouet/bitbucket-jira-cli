site_name: Bitbucket Jira CLI
site_description: >-
  A gh-style CLI for Bitbucket pull requests, repos and pipelines, and Jira
  issues, with branch-name-as-Jira-key automation.
site_url: https://spenhouet.github.io/bitbucket-jira-cli/
site_author: Sebastian Penhouet
copyright: Copyright &copy; 2026 Sebastian Penhouet

repo_url: https://github.com/Spenhouet/bitbucket-jira-cli
repo_name: Spenhouet/bitbucket-jira-cli
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  logo: img/favicon.svg
  favicon: img/favicon.svg
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Spenhouet/bitbucket-jira-cli
      name: Source on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/bitbucket-jira-cli/
      name: Package on PyPI
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/spenhouet/bitbucket-jira-cli
      name: Image on Docker Hub

extra_css:
  - stylesheets/extra.css

